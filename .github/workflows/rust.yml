name: Rust

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check crate
        run: cargo check --all-targets --all-features
